{% extends "base.html" %}
{% block title %}Přidat položku{% endblock %}
{% block content %}
<div class="row justify-content-center">

        <h2 class="mb-4">Přidat položku k faktuře č. {{ invoice.invoice_number }}</h2>

        <form action="/invoices/{{ invoice.id }}/items" method="post">
            <input type="hidden" name="invoice_id" value="{{ invoice.id }}">

            <div class="mb-3">
                <label for="name" class="form-label">Název položky</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="quantity" class="form-label">Množství</label>
                    <input type="number"  class="form-control"
                           id="quantity" name="quantity" value="1" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="unit_price" class="form-label">Cena za kus (Kč)</label>
                    <input type="number"  class="form-control"
                           id="unit_price" name="unit_price" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Přidat položku</button>
        </form>

</div>
<br>
<a href="/invoices/{{invoice.id}}" class="btn btn-secondary">Prejit zpet</a>
{% endblock %}
