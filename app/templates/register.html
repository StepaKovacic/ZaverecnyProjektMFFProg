{% extends "base.html" %}
{% block title %}Registrace{% endblock %}
{% block content %}

<form action="/register" method="post">
  <div class="form-group">
    <label for="username">Uživatelské jméno</label>
    <input type="text" class="form-control" id="username" name="username" placeholder="Uživatelské jméno" required>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" class="form-control" id="email" name="email" aria-describedby="emailHelp" placeholder="Enter email" required>
    <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
  </div>

  <div class="form-group">
    <label for="password">Heslo</label>
    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required minlength="8">
  </div>

  <div class="form-group">
    <label for="first_name">Křestní jméno</label>
    <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Křestní jméno" required>
  </div>

  <div class="form-group">
    <label for="last_name">Příjmení</label>
    <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Příjmení" required>
  </div>

  <div class="form-group">
    <label for="ico">Identifikační číslo osoby</label>
    <input type="text" class="form-control" id="ico" name="ico" placeholder="IČO" required>
  </div>

  <div class="form-group">
    <label for="phone">Telefonní číslo</label>
    <input type="tel" class="form-control" id="phone" name="phone" placeholder="Telefonní číslo">
  </div>

  <button type="submit" class="btn btn-primary">Zaregistrovat se</button>
</form>
{% endblock %}
